# =============================================================================
# scrLanding — Landing. SOURCE OF TRUTH = the maker's Studio-aligned version
# (View code, 22/07/2026): proportional header (conLogo 0.5 / conBrand 0.7 /
# conHeaderUser 0.20), welcome card, action cards. Only deliberate divergence
# from that export: lblFormBody says "top three choices" (Workstream 7).
# NOTE: uses LayoutMinHeight/LayoutMinWidth, DropShadow, BorderStyle — all
# confirmed valid in this environment by the export.
# =============================================================================
Screens:
  scrLanding:
    Properties:
      Fill: =ColorValue("#F2F5F7")
    Children:
      - conRoot:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =ColorValue("#F2F5F7")
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutOverflowY: =LayoutOverflow.Scroll
            Width: =Parent.Width
          Children:
            - conHeaderBar:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =ColorValue("#002B54")
                  FillPortions: =0
                  Height: =64
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =16
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  Width: =Parent.Width
                Children:
                  - conLogo:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Width: =Parent.Width * 0.5
                      Children:
                        - lblLogo:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Center
                              Color: =ColorValue("#FFFFFF")
                              Fill: =ColorValue("#008531")
                              FontWeight: =FontWeight.Bold
                              Height: =36
                              Size: =18
                              Text: ="A"
                              Width: =36
                              X: =20
                              Y: =14
                  - conBrand:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =Parent.Height
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =14
                        Width: =Parent.Width * 0.7
                      Children:
                        - conBrandText:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              LayoutDirection: =LayoutDirection.Vertical
                              PaddingTop: =12
                              Width: =Parent.Width - 50
                            Children:
                              - lblOrg:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =ColorValue("#9FC9E4")
                                    FontWeight: =FontWeight.Semibold
                                    Height: =16
                                    Size: =11
                                    Text: ="ENVIRONMENT AGENCY"
                                    Width: =Parent.Width
                              - lblAppName:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =ColorValue("#FFFFFF")
                                    FontWeight: =FontWeight.Semibold
                                    Height: =24
                                    Size: =15
                                    Text: ="Aurora — Role Preference"
                                    Width: =Parent.Width
                  - conHeaderUser:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =Parent.Height
                        LayoutAlignItems: =LayoutAlignItems.End
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingTop: =12
                        Width: =Parent.Width * 0.20
                      Children:
                        - lblUserName:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Right
                              Color: =ColorValue("#FFFFFF")
                              FontWeight: =FontWeight.Semibold
                              Height: =20
                              Text: =varUser.Name
                              Width: =Parent.Width
                        - lblUserMeta:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Right
                              Color: =ColorValue("#A9BACB")
                              Height: =18
                              Size: =11
                              Text: =varUser.Grade & " · " & varUser.Area
                              Width: =Parent.Width
            - recGreenStrip:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  Fill: =ColorValue("#008531")
                  FillPortions: =0
                  Height: =4
                  Width: =Parent.Width
            - conMain:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Height: =800
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  PaddingBottom: =80
                  PaddingLeft: =24
                  PaddingRight: =24
                  PaddingTop: =40
                  Width: =Parent.Width
                Children:
                  - conContent:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =750
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =28
                        Width: =Min(Parent.Width - 48, 1120)
                      Children:
                        - cardWelcome:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              BorderColor: =ColorValue("#DCE2E8")
                              BorderThickness: =1
                              Fill: =ColorValue("#FFFFFF")
                              FillPortions: =0
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =8
                              PaddingBottom: =30
                              PaddingLeft: =34
                              PaddingRight: =34
                              PaddingTop: =15
                              RadiusBottomLeft: =14
                              RadiusBottomRight: =14
                              RadiusTopLeft: =14
                              RadiusTopRight: =14
                            Children:
                              - lblWelcomeTitle:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =ColorValue("#002B54")
                                    FontWeight: =FontWeight.Bold
                                    Size: =26
                                    Text: ="Welcome, " & varUser.Name
                                    Width: =Parent.Width
                              - conWelcomeGrid:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    FillPortions: =0
                                    Height: =63
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =32
                                    PaddingTop: =16
                                    Width: =Parent.Width - 68
                                  Children:
                                    - conGrade:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          DropShadow: =DropShadow.None
                                          FillPortions: =0
                                          Height: =42
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =5
                                          Width: =220
                                        Children:
                                          - lblGradeCap:
                                              Control: Label@2.5.1
                                              Properties:
                                                Color: =ColorValue("#5B6670")
                                                FontWeight: =FontWeight.Semibold
                                                Height: =18
                                                Size: =12
                                                Text: ="GRADE"
                                                Width: =Parent.Width
                                          - lblGradeVal:
                                              Control: Label@2.5.1
                                              Properties:
                                                BorderStyle: =BorderStyle.None
                                                Color: =ColorValue("#1F2933")
                                                FontWeight: =FontWeight.Semibold
                                                Height: =24
                                                Size: =16
                                                Text: =varUser.Grade
                                                Width: =Parent.Width
                                    - conArea:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          DropShadow: =DropShadow.None
                                          FillPortions: =0
                                          Height: =47
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =5
                                          Width: =320
                                        Children:
                                          - lblAreaCap:
                                              Control: Label@2.5.1
                                              Properties:
                                                Color: =ColorValue("#5B6670")
                                                FontWeight: =FontWeight.Semibold
                                                Height: =18
                                                Size: =12
                                                Text: ="AREA"
                                                Width: =Parent.Width
                                          - lblAreaVal:
                                              Control: Label@2.5.1
                                              Properties:
                                                Color: =ColorValue("#1F2933")
                                                FontWeight: =FontWeight.Semibold
                                                Height: =24
                                                Size: =16
                                                Text: =varUser.Area
                                                Width: =Parent.Width
                                    - conTeam:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          DropShadow: =DropShadow.None
                                          FillPortions: =0
                                          Height: =47
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =5
                                          Width: =220
                                        Children:
                                          - lblTeamCap:
                                              Control: Label@2.5.1
                                              Properties:
                                                Color: =ColorValue("#5B6670")
                                                FontWeight: =FontWeight.Semibold
                                                Height: =18
                                                Size: =12
                                                Text: ="TEAM"
                                                Width: =Parent.Width
                                          - lblTeamVal:
                                              Control: Label@2.5.1
                                              Properties:
                                                Color: =ColorValue("#1F2933")
                                                FontWeight: =FontWeight.Semibold
                                                Height: =24
                                                Size: =16
                                                Text: =varUser.Team
                                                Width: =Parent.Width
                              - lblLastLogin:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =ColorValue("#5B6670")
                                    PaddingTop: =18
                                    Text: |-
                                      ="Last logged in: " & varUser.LastLogin
                                    Width: =Parent.Width
                        - lblDoHeading:
                            Control: Label@2.5.1
                            Properties:
                              Color: =ColorValue("#002B54")
                              FontWeight: =FontWeight.Bold
                              Height: =28
                              Size: =18
                              Text: ="What would you like to do?"
                              Width: =Parent.Width
                        - conActions:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              BorderColor: |+
                                =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              DropShadow: =DropShadow.None
                              FillPortions: =0
                              Height: =450
                              LayoutAlignItems: =LayoutAlignItems.Stretch
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =20
                              Width: =Parent.Width
                            Children:
                              - cardForm:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    BorderColor: =ColorValue("#DCE2E8")
                                    BorderThickness: =1
                                    Fill: =ColorValue("#FFFFFF")
                                    FillPortions: =0
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =8
                                    PaddingBottom: =22
                                    PaddingLeft: =24
                                    PaddingRight: =24
                                    PaddingTop: =24
                                    RadiusBottomLeft: =12
                                    RadiusBottomRight: =12
                                    RadiusTopLeft: =12
                                    RadiusTopRight: =12
                                    Width: =Min(Parent.Width, 540)
                                  Children:
                                    - recFormAccent:
                                        Control: GroupContainer@1.5.0
                                        Variant: ManualLayout
                                        Properties:
                                          Fill: =ColorValue("#008531")
                                          FillPortions: =0
                                          Height: =4
                                          Width: =Parent.Width - 48
                                    - lblFormBadge:
                                        Control: Label@2.5.1
                                        Properties:
                                          Align: =Align.Center
                                          Color: =ColorValue("#006B27")
                                          Fill: =ColorValue("#E4F3EA")
                                          FontWeight: =FontWeight.Bold
                                          Height: =26
                                          PaddingLeft: =10
                                          PaddingRight: =10
                                          Size: =11
                                          Text: ="ALL STAFF"
                                          Width: =92
                                    - lblFormTitle:
                                        Control: Label@2.5.1
                                        Properties:
                                          Color: =ColorValue("#002B54")
                                          FontWeight: =FontWeight.Bold
                                          Height: =26
                                          Size: =17
                                          Text: ="My Preference Form"
                                          Width: =Parent.Width
                                    - lblFormBody:
                                        Control: Label@2.5.1
                                        Properties:
                                          AutoHeight: =true
                                          Color: =ColorValue("#5B6670")
                                          Size: =14
                                          Text: ="Rank the roles you have been identified as eligible for, then answer a few questions about your top three choices."
                                          Width: =Parent.Width - 48
                                    - btnOpenForm:
                                        Control: Label@2.5.1
                                        Properties:
                                          Color: =ColorValue("#008531")
                                          Fill: =ColorValue("#FFFFFF")
                                          FontWeight: =FontWeight.Semibold
                                          OnSelect: |-
                                            =If(
                                                varStage2Submitted, Navigate(scrCompleted),
                                                varStage1Submitted, Navigate(scrReview),
                                                Navigate(scrForm)
                                            )
                                          Size: =15
                                          Text: ="Open form →"
                                          Width: =Parent.Width - 48
                              - cardAdmin:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    BorderColor: =ColorValue("#C9D4DE")
                                    BorderThickness: =1
                                    Fill: =ColorValue("#FFFFFF")
                                    FillPortions: =0
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =8
                                    PaddingBottom: =22
                                    PaddingLeft: =24
                                    PaddingRight: =24
                                    PaddingTop: =24
                                    RadiusBottomLeft: =12
                                    RadiusBottomRight: =12
                                    RadiusTopLeft: =12
                                    RadiusTopRight: =12
                                    Visible: =varIsAdmin
                                    Width: =Min(Parent.Width, 540)
                                  Children:
                                    - recAdminAccent:
                                        Control: GroupContainer@1.5.0
                                        Variant: ManualLayout
                                        Properties:
                                          Fill: =ColorValue("#54BCE7")
                                          FillPortions: =0
                                          Height: =4
                                          Width: =Parent.Width - 48
                                    - lblAdminBadge:
                                        Control: Label@2.5.1
                                        Properties:
                                          Align: =Align.Center
                                          BorderColor: =ColorValue("#BBE2F4")
                                          BorderThickness: =1
                                          Color: =ColorValue("#002B54")
                                          Fill: =ColorValue("#E1F2FB")
                                          FontWeight: =FontWeight.Bold
                                          Height: =26
                                          PaddingLeft: =10
                                          PaddingRight: =10
                                          Size: =11
                                          Text: ="RESTRICTED · ADMIN ONLY"
                                          Width: =215
                                    - lblAdminTitle:
                                        Control: Label@2.5.1
                                        Properties:
                                          Color: =ColorValue("#002B54")
                                          FontWeight: =FontWeight.Bold
                                          Height: =26
                                          Size: =17
                                          Text: ="Submissions Overview"
                                          Width: =Parent.Width
                                    - lblAdminBody:
                                        Control: Label@2.5.1
                                        Properties:
                                          AutoHeight: =true
                                          Color: =ColorValue("#5B6670")
                                          Size: =14
                                          Text: ="View and manage submitted role preferences. Available to authorised HR administrators."
                                          Width: =Parent.Width - 48
                                    - btnOpenOverview:
                                        Control: Label@2.5.1
                                        Properties:
                                          Color: =ColorValue("#0E6FA8")
                                          Fill: =ColorValue("#FFFFFF")
                                          FontWeight: =FontWeight.Semibold
                                          OnSelect: =Navigate(scrOverview)
                                          Size: =15
                                          Text: ="Open overview →"
                                          Width: =Parent.Width - 48
