# =============================================================================
# scrDetail — Role profile for varDetailRoleKey (LookUp into colRoles ->
# REPOINT to Roles table). Purpose + Responsibilities/Requirements bullets +
# Grade context. Back returns to the origin screen (varDetailOrigin: form /
# review / questions), with the matching label.
# =============================================================================
Screens:
  scrDetail:
    Properties:
      Fill: =ColorValue("#F2F5F7")
    Children:
      - conRoot:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =Parent.Height
            Fill: =ColorValue("#F2F5F7")
            LayoutDirection: =LayoutDirection.Vertical
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutOverflowY: =LayoutOverflow.Scroll
          Children:
            - conHeaderBar:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Fill: =ColorValue("#002B54")
                  Height: =64
                  Width: =Parent.Width
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  PaddingLeft: =24
                  PaddingRight: =24
                Children:
                  - lblHdrName:
                      Control: Label@2.5.1
                      Properties:
                        FillPortions: =1
                        Text: ="Aurora — Role Preference"
                        Color: =ColorValue("#FFFFFF")
                        Size: =15
                        FontWeight: =FontWeight.Semibold
                  - lblHdrUser:
                      Control: Label@2.5.1
                      Properties:
                        FillPortions: =1
                        Text: =varUser.Name & "  ·  " & varUser.Grade
                        Color: =ColorValue("#A9BACB")
                        Size: =12
                        Align: =Align.Right
            - recGreenStrip:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  FillPortions: =0
                  Fill: =ColorValue("#008531")
                  Height: =4
                  Width: =Parent.Width
            - conMain:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =1
                  Width: =Parent.Width
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutAlignItems: =LayoutAlignItems.Center
                  PaddingTop: =40
                  PaddingBottom: =80
                  PaddingLeft: =24
                  PaddingRight: =24
                Children:
                  - conContent:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        Height: =976
                        FillPortions: =0
                        Width: =Min(Parent.Width - 48, 1120)
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =24
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                      Children:
                        - btnBackTop:
                            Control: Label@2.5.1
                            Properties:
                              FillPortions: =0
                              # Back label + target derived from origin
                              Text: |-
                                ="← " & Switch(varDetailOrigin, "questions", "Back to questions", "review", "Back to your ranking", "Back to ranking form")
                              OnSelect: |-
                                =Navigate(Switch(varDetailOrigin, "questions", scrQuestions, "review", scrReview, scrForm))
                              Fill: =ColorValue("#F2F5F7")
                              Color: =ColorValue("#0E6FA8")
                              BorderThickness: =0
                              Align: =Align.Left
                              Size: =14
                              FontWeight: =FontWeight.Semibold
                              Height: =22
                              Width: =240
                        - lblEyebrow:
                            Control: Label@2.5.1
                            Properties:
                              Width: =Parent.Width
                              FillPortions: =0
                              Text: ="ROLE PROFILE"
                              Color: =ColorValue("#5B6670")
                              Size: =13
                              FontWeight: =FontWeight.Semibold
                              Height: =18
                        - lblRoleTitle:
                            Control: Label@2.5.1
                            Properties:
                              Width: =Parent.Width
                              FillPortions: =0
                              Text: =LookUp(colRoles, Key = varDetailRoleKey).Name
                              Color: =ColorValue("#002B54")
                              Size: =24
                              FontWeight: =FontWeight.Bold
                              Height: =36
                        - cardProfile:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Height: =756
                              FillPortions: =0
                              Fill: =ColorValue("#FFFFFF")
                              BorderColor: =ColorValue("#DCE2E8")
                              BorderThickness: =1
                              RadiusTopLeft: =12
                              RadiusTopRight: =12
                              RadiusBottomLeft: =12
                              RadiusBottomRight: =12
                              PaddingTop: =28
                              PaddingBottom: =28
                              PaddingLeft: =30
                              PaddingRight: =30
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =24
                              Width: =Min(Parent.Width, 820)
                            Children:
                              # ---- Purpose ----
                              - lblPurposeCap:
                                  Control: Label@2.5.1
                                  Properties:
                                    Width: =Parent.Width
                                    FillPortions: =0
                                    Text: ="PURPOSE"
                                    Color: =ColorValue("#475160")
                                    Size: =12
                                    FontWeight: =FontWeight.Bold
                                    Height: =18
                              - lblPurpose:
                                  Control: Label@2.5.1
                                  Properties:
                                    FillPortions: =0
                                    Text: =LookUp(colRoles, Key = varDetailRoleKey).Purpose
                                    Color: =ColorValue("#1F2933")
                                    Size: =16
                                    AutoHeight: =true
                                    Width: =Parent.Width - 60
                              # ---- Responsibilities (bulleted) ----
                              - lblRespCap:
                                  Control: Label@2.5.1
                                  Properties:
                                    Width: =Parent.Width
                                    FillPortions: =0
                                    Text: ="KEY RESPONSIBILITIES"
                                    Color: =ColorValue("#475160")
                                    Size: =12
                                    FontWeight: =FontWeight.Bold
                                    Height: =18
                                    PaddingTop: =10
                              - galResp:
                                  Control: Gallery@2.15.0
                                  Variant: Vertical
                                  Properties:
                                    FillPortions: =0
                                    Items: =LookUp(colRoles, Key = varDetailRoleKey).Responsibilities
                                    Width: =Parent.Width - 60
                                    Height: =CountRows(LookUp(colRoles, Key = varDetailRoleKey).Responsibilities) * 30
                                    TemplateSize: =30
                                  Children:
                                    - lblRespItem:
                                        Control: Label@2.5.1
                                        Properties:
                                          Text: ="•  " & ThisItem.Item
                                          Color: =ColorValue("#3A4651")
                                          Size: =15
                                          Height: =28
                                          Width: =Parent.TemplateWidth
                              # ---- Requirements (bulleted) ----
                              - lblReqCap:
                                  Control: Label@2.5.1
                                  Properties:
                                    Width: =Parent.Width
                                    FillPortions: =0
                                    Text: ="WHAT IT REQUIRES"
                                    Color: =ColorValue("#475160")
                                    Size: =12
                                    FontWeight: =FontWeight.Bold
                                    Height: =18
                                    PaddingTop: =10
                              - galReq:
                                  Control: Gallery@2.15.0
                                  Variant: Vertical
                                  Properties:
                                    FillPortions: =0
                                    Items: =LookUp(colRoles, Key = varDetailRoleKey).Requirements
                                    Width: =Parent.Width - 60
                                    Height: =CountRows(LookUp(colRoles, Key = varDetailRoleKey).Requirements) * 30
                                    TemplateSize: =30
                                  Children:
                                    - lblReqItem:
                                        Control: Label@2.5.1
                                        Properties:
                                          Text: ="•  " & ThisItem.Item
                                          Color: =ColorValue("#3A4651")
                                          Size: =15
                                          Height: =28
                                          Width: =Parent.TemplateWidth
                              # ---- Grade context ----
                              - lblGradeCap:
                                  Control: Label@2.5.1
                                  Properties:
                                    Width: =Parent.Width
                                    FillPortions: =0
                                    Text: ="GRADE CONTEXT"
                                    Color: =ColorValue("#475160")
                                    Size: =12
                                    FontWeight: =FontWeight.Bold
                                    Height: =18
                                    PaddingTop: =10
                              - lblGradeCtx:
                                  Control: Label@2.5.1
                                  Properties:
                                    FillPortions: =0
                                    Text: =LookUp(colRoles, Key = varDetailRoleKey).GradeContext
                                    Color: =ColorValue("#3A4651")
                                    Size: =15
                                    AutoHeight: =true
                                    Width: =Parent.Width - 60
                        - btnBackBottom:
                            Control: Label@2.5.1
                            Properties:
                              FillPortions: =0
                              Text: |-
                                =Switch(varDetailOrigin, "questions", "Back to questions", "review", "Back to your ranking", "Back to ranking form")
                              OnSelect: |-
                                =Navigate(Switch(varDetailOrigin, "questions", scrQuestions, "review", scrReview, scrForm))
                              Fill: =ColorValue("#FFFFFF")
                              Color: =ColorValue("#002B54")
                              BorderColor: =ColorValue("#002B54")
                              BorderThickness: =2
                              Size: =16
                              FontWeight: =FontWeight.Semibold
                              Height: =48
                              Width: =220
