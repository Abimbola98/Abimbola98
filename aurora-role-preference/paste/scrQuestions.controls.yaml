- conRoot:
    Control: GroupContainer
    Variant: verticalAutoLayoutContainer
    Properties:
      X: =0
      Y: =0
      Width: =Parent.Width
      Height: =Parent.Height
      Fill: =ColorValue("#F2F5F7")
      LayoutDirection: =LayoutDirection.Vertical
      LayoutMode: =LayoutMode.Auto
      LayoutAlignItems: =LayoutAlignItems.Stretch
      LayoutOverflowY: =LayoutOverflow.Scroll
    Children:
      - conHeaderBar:
          Control: GroupContainer
          Variant: horizontalAutoLayoutContainer
          Properties:
            Fill: =ColorValue("#002B54")
            Height: =64
            Width: =Parent.Width
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutMode: =LayoutMode.Auto
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingLeft: =24
            PaddingRight: =24
          Children:
            - lblHdrName:
                Control: Label
                Properties:
                  Text: ="Aurora — Role Preference"
                  Color: =ColorValue("#FFFFFF")
                  Size: =15
                  FontWeight: =FontWeight.Semibold
            - lblHdrUser:
                Control: Label
                Properties:
                  Text: =varUser.Name & "  ·  " & varUser.Grade
                  Color: =ColorValue("#A9BACB")
                  Size: =12
                  Align: =Align.Right
      - recGreenStrip:
          Control: Rectangle
          Properties:
            Fill: =ColorValue("#008531")
            Height: =4
            Width: =Parent.Width
      - conMain:
          Control: GroupContainer
          Variant: verticalAutoLayoutContainer
          Properties:
            Width: =Parent.Width
            LayoutDirection: =LayoutDirection.Vertical
            LayoutMode: =LayoutMode.Auto
            LayoutAlignItems: =LayoutAlignItems.Center
            PaddingTop: =40
            PaddingBottom: =80
            PaddingLeft: =24
            PaddingRight: =24
          Children:
            - conContent:
                Control: GroupContainer
                Variant: verticalAutoLayoutContainer
                Properties:
                  Width: =Min(Parent.Width - 48, 1120)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutMode: =LayoutMode.Auto
                  LayoutGap: =24
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                Children:
                  - btnBackReview:
                      Control: Classic/Button
                      Properties:
                        Text: ="← Back to your ranking"
                        OnSelect: =Navigate(scrReview)
                        Fill: =ColorValue("#F2F5F7")
                        Color: =ColorValue("#0E6FA8")
                        BorderThickness: =0
                        HoverFill: =ColorValue("#E9EEF2")
                        Align: =Align.Left
                        Size: =14
                        FontWeight: =FontWeight.Semibold
                        Height: =22
                        Width: =220
                  - lblStagePill:
                      Control: Label
                      Properties:
                        Text: ="● Stage 2 of 2 · Supporting questions"
                        Color: =ColorValue("#0E6FA8")
                        Fill: =ColorValue("#EBF6FB")
                        BorderColor: =ColorValue("#C7E6F4")
                        BorderThickness: =1
                        Size: =12
                        FontWeight: =FontWeight.Bold
                        PaddingLeft: =12
                        PaddingRight: =12
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =290
                        Height: =28
                        RadiusTopLeft: =999
                        RadiusTopRight: =999
                        RadiusBottomLeft: =999
                        RadiusBottomRight: =999
                  - lblTitle:
                      Control: Label
                      Properties:
                        Text: ="Tell us about your top two choices"
                        Color: =ColorValue("#002B54")
                        Size: =24
                        FontWeight: =FontWeight.Bold
                        Height: =36
                  - lblSub:
                      Control: Label
                      Properties:
                        Text: ="These questions cover only the two roles you ranked highest. The questions differ for each role. All questions are required before you can submit."
                        Color: =ColorValue("#5B6670")
                        Size: =15
                        AutoHeight: =true
                        Width: =Parent.Width
                  - galSections:
                      Control: Gallery
                      Variant: Vertical
                      Properties:
                        Items: |-
                          =ForAll(
                              Sequence(2) As p,
                              With(
                                  {row: Index(colLockedRanking, p.Value)},
                                  {RoleKey: row.RoleKey, RoleName: row.RoleName, RankLabel: If(p.Value = 1, "Top choice · Rank 1", "Second choice · Rank 2")}
                              )
                          )
                        Width: =Parent.Width
                        Height: =2 * 580
                        TemplateSize: =580
                        TemplatePadding: =0
                      Children:
                        - cardSection:
                            Control: GroupContainer
                            Variant: verticalAutoLayoutContainer
                            Properties:
                              Fill: =ColorValue("#FFFFFF")
                              BorderColor: =ColorValue("#DCE2E8")
                              BorderThickness: =1
                              RadiusTopLeft: =12
                              RadiusTopRight: =12
                              RadiusBottomLeft: =12
                              RadiusBottomRight: =12
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutMode: =LayoutMode.Auto
                              Width: =Parent.TemplateWidth
                              Height: =Parent.TemplateHeight - 20
                            Children:
                              - conSecHdr:
                                  Control: GroupContainer
                                  Variant: horizontalAutoLayoutContainer
                                  Properties:
                                    Fill: =ColorValue("#F4F7F9")
                                    BorderColor: =ColorValue("#DCE2E8")
                                    BorderThickness: =1
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutMode: =LayoutMode.Auto
                                    LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                                    LayoutAlignItems: =LayoutAlignItems.Start
                                    PaddingTop: =18
                                    PaddingBottom: =18
                                    PaddingLeft: =24
                                    PaddingRight: =24
                                    Width: =Parent.Width
                                  Children:
                                    - conSecTitle:
                                        Control: GroupContainer
                                        Variant: verticalAutoLayoutContainer
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutMode: =LayoutMode.Auto
                                          LayoutGap: =3
                                          Width: =Parent.Width - 140
                                        Children:
                                          - lblSecRank:
                                              Control: Label
                                              Properties:
                                                Text: =Upper(ThisItem.RankLabel)
                                                Color: =ColorValue("#0E6FA8")
                                                Size: =12
                                                FontWeight: =FontWeight.Bold
                                                Height: =18
                                          - lblSecRole:
                                              Control: Label
                                              Properties:
                                                Text: =ThisItem.RoleName
                                                Color: =ColorValue("#002B54")
                                                Size: =18
                                                FontWeight: =FontWeight.Bold
                                                Height: =26
                                    - btnSecDetails:
                                        Control: Classic/Button
                                        Properties:
                                          Text: ="Role details ›"
                                          OnSelect: |-
                                            =Set(varDetailRoleKey, ThisItem.RoleKey);
                                            Set(varDetailOrigin, "questions");
                                            Navigate(scrDetail)
                                          Fill: =ColorValue("#F4F7F9")
                                          Color: =ColorValue("#0E6FA8")
                                          BorderThickness: =0
                                          Size: =13
                                          FontWeight: =FontWeight.Semibold
                                          Height: =34
                                          Width: =120
                              - galQuestions:
                                  Control: Gallery
                                  Variant: Vertical
                                  Properties:
                                    Items: =SortByColumns(Filter(colAnswers, RoleKey = ThisItem.RoleKey), "QIndex", SortOrder.Ascending)
                                    Width: =Parent.Width
                                    Height: =3 * 150
                                    TemplateSize: =150
                                    PaddingLeft: =24
                                    PaddingRight: =24
                                  Children:
                                    - conQ:
                                        Control: GroupContainer
                                        Variant: verticalAutoLayoutContainer
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutMode: =LayoutMode.Auto
                                          LayoutGap: =8
                                          PaddingTop: =18
                                          Width: =Parent.TemplateWidth - 48
                                          Height: =Parent.TemplateHeight
                                        Children:
                                          - lblQ:
                                              Control: Label
                                              Properties:
                                                Text: =ThisItem.QuestionText
                                                Color: =ColorValue("#1F2933")
                                                Size: =15
                                                FontWeight: =FontWeight.Semibold
                                                AutoHeight: =true
                                                Width: =Parent.Width
                                          - txtAnswer:
                                              Control: Classic/TextInput
                                              Properties:
                                                Default: =ThisItem.Answer
                                                Mode: =TextMode.MultiLine
                                                HintText: ="Type your answer…"
                                                OnChange: |-
                                                  =Patch(
                                                      colAnswers,
                                                      LookUp(colAnswers, RoleKey = ThisItem.RoleKey And QIndex = ThisItem.QIndex),
                                                      {Answer: Self.Text}
                                                  );
                                                  Set(varDraftSaved, false)
                                                Color: =ColorValue("#1F2933")
                                                Fill: =ColorValue("#FFFFFF")
                                                BorderColor: =ColorValue("#9AA7B2")
                                                BorderThickness: =1
                                                Size: =15
                                                Height: =88
                                                Width: =Parent.Width
                                                RadiusTopLeft: =8
                                                RadiusTopRight: =8
                                                RadiusBottomLeft: =8
                                                RadiusBottomRight: =8
                  - bannerDraft:
                      Control: GroupContainer
                      Variant: verticalAutoLayoutContainer
                      Properties:
                        Visible: =varDraftSaved
                        Fill: =ColorValue("#E4F3EA")
                        BorderColor: =ColorValue("#B5DEC5")
                        BorderThickness: =1
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                        PaddingTop: =14
                        PaddingBottom: =14
                        PaddingLeft: =18
                        PaddingRight: =18
                        Width: =Parent.Width
                      Children:
                        - lblDraft:
                            Control: Label
                            Properties:
                              Text: ="Your draft has been saved. You can return and complete it later."
                              Color: =ColorValue("#006B27")
                              Size: =14
                              FontWeight: =FontWeight.Semibold
                              AutoHeight: =true
                              Width: =Parent.Width - 36
                  - conFooter:
                      Control: GroupContainer
                      Variant: horizontalAutoLayoutContainer
                      Properties:
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutMode: =LayoutMode.Auto
                        LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutWrap: =true
                        LayoutGap: =18
                        Width: =Parent.Width
                      Children:
                        - btnSaveDraft:
                            Control: Classic/Button
                            Properties:
                              Text: ="Save draft"
                              OnSelect: =Set(varDraftSaved, true)
                              Fill: =ColorValue("#FFFFFF")
                              Color: =ColorValue("#002B54")
                              HoverFill: =ColorValue("#EEF3F8")
                              BorderColor: =ColorValue("#002B54")
                              BorderThickness: =2
                              Size: =16
                              FontWeight: =FontWeight.Semibold
                              Height: =48
                              Width: =150
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                        - conSubmitWrap:
                            Control: GroupContainer
                            Variant: horizontalAutoLayoutContainer
                            Properties:
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutMode: =LayoutMode.Auto
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutJustifyContent: =LayoutJustifyContent.End
                              LayoutWrap: =true
                              LayoutGap: =18
                              Width: =520
                            Children:
                              - lblSubmitHelper:
                                  Control: Label
                                  Properties:
                                    Text: ="Once submitted, your ranking and answers are final and cannot be changed."
                                    Color: =ColorValue("#5B6670")
                                    Size: =13
                                    Align: =Align.Right
                                    AutoHeight: =true
                                    Width: =300
                              - btnSubmit:
                                  Control: Classic/Button
                                  Properties:
                                    Text: ="Submit answers"
                                    DisplayMode: =If(CountRows(Filter(colAnswers, Required And Len(Trim(Answer)) = 0)) = 0, DisplayMode.Edit, DisplayMode.Disabled)
                                    OnSelect: |-
                                      =UpdateContext({locShowSubmit: true})
                                    Fill: =If(CountRows(Filter(colAnswers, Required And Len(Trim(Answer)) = 0)) = 0, ColorValue("#008531"), ColorValue("#C8CFD5"))
                                    Color: =If(CountRows(Filter(colAnswers, Required And Len(Trim(Answer)) = 0)) = 0, ColorValue("#FFFFFF"), ColorValue("#79838C"))
                                    HoverFill: =If(CountRows(Filter(colAnswers, Required And Len(Trim(Answer)) = 0)) = 0, ColorValue("#00712A"), ColorValue("#C8CFD5"))
                                    BorderThickness: =0
                                    Size: =16
                                    FontWeight: =FontWeight.Bold
                                    Height: =48
                                    Width: =180
                                    RadiusTopLeft: =8
                                    RadiusTopRight: =8
                                    RadiusBottomLeft: =8
                                    RadiusBottomRight: =8
- conSubmitOverlay:
    Control: GroupContainer
    Variant: manualLayoutContainer
    Properties:
      Visible: =locShowSubmit
      X: =0
      Y: =0
      Width: =Parent.Width
      Height: =Parent.Height
    Children:
      - recScrim:
          Control: Rectangle
          Properties:
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =Parent.Height
            Fill: =RGBA(0, 43, 84, 0.55)
            OnSelect: |-
              =UpdateContext({locShowSubmit: false})
      - dlgSubmit:
          Control: GroupContainer
          Variant: verticalAutoLayoutContainer
          Properties:
            X: =(Parent.Width - Min(Parent.Width - 48, 480)) / 2
            Y: =Max((Parent.Height - 240) / 2, 24)
            Width: =Min(Parent.Width - 48, 480)
            Fill: =ColorValue("#FFFFFF")
            RadiusTopLeft: =14
            RadiusTopRight: =14
            RadiusBottomLeft: =14
            RadiusBottomRight: =14
            PaddingTop: =28
            PaddingBottom: =22
            PaddingLeft: =28
            PaddingRight: =28
            LayoutDirection: =LayoutDirection.Vertical
            LayoutMode: =LayoutMode.Auto
            LayoutGap: =10
          Children:
            - lblDlgTitle:
                Control: Label
                Properties:
                  Text: ="Submit your form?"
                  Color: =ColorValue("#002B54")
                  Size: =21
                  FontWeight: =FontWeight.Bold
                  Height: =30
            - lblDlgBody:
                Control: Label
                Properties:
                  Text: ="Once you submit, your ranking and your answers are final and cannot be changed."
                  Color: =ColorValue("#3A4651")
                  Size: =15
                  AutoHeight: =true
                  Width: =Parent.Width - 56
            - conDlgBtns:
                Control: GroupContainer
                Variant: horizontalAutoLayoutContainer
                Properties:
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMode: =LayoutMode.Auto
                  LayoutJustifyContent: =LayoutJustifyContent.End
                  LayoutGap: =12
                  PaddingTop: =14
                  Width: =Parent.Width - 56
                Children:
                  - btnCancelSubmit:
                      Control: Classic/Button
                      Properties:
                        Text: ="Cancel"
                        OnSelect: |-
                          =UpdateContext({locShowSubmit: false})
                        Fill: =ColorValue("#FFFFFF")
                        Color: =ColorValue("#002B54")
                        HoverFill: =ColorValue("#EEF3F8")
                        BorderColor: =ColorValue("#002B54")
                        BorderThickness: =2
                        Size: =15
                        FontWeight: =FontWeight.Semibold
                        Height: =46
                        Width: =130
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
                  - btnConfirmSubmit:
                      Control: Classic/Button
                      Properties:
                        Text: ="Yes, submit"
                        OnSelect: |-
                          =ClearCollect(
                              colPreferenceResponses,
                              ForAll(
                                  colAnswers As a,
                                  {EmployeeID: varUser.EmpId, RoleKey: a.RoleKey, QIndex: a.QIndex, QuestionText: a.QuestionText, ResponseText: a.Answer, SubmittedOn: Now(), Stage2Status: "Submitted"}
                              )
                          );
                          Set(varStage2Submitted, true);
                          Set(varStage2Date, Text(Now(), "dd/mm/yyyy"));
                          UpdateContext({locShowSubmit: false});
                          Navigate(scrCompleted)
                        Fill: =ColorValue("#008531")
                        Color: =ColorValue("#FFFFFF")
                        HoverFill: =ColorValue("#00712A")
                        BorderThickness: =0
                        Size: =15
                        FontWeight: =FontWeight.Bold
                        Height: =46
                        Width: =150
                        RadiusTopLeft: =8
                        RadiusTopRight: =8
                        RadiusBottomLeft: =8
                        RadiusBottomRight: =8
