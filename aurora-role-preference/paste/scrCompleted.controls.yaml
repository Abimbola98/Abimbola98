- conRoot:
    Control: GroupContainer@1.5.0
    Variant: AutoLayout
    Properties:
      X: =0
      Y: =0
      Width: =Parent.Width
      Height: =Parent.Height
      Fill: =ColorValue("#F2F5F7")
      LayoutDirection: =LayoutDirection.Vertical
      LayoutAlignItems: =LayoutAlignItems.Stretch
      LayoutOverflowY: =LayoutOverflow.Scroll
    Children:
      - conHeaderBar:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            FillPortions: =0
            Fill: =ColorValue("#002B54")
            Height: =64
            Width: =Parent.Width
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingLeft: =24
            PaddingRight: =24
          Children:
            - lblHdrName:
                Control: Label@2.5.1
                Properties:
                  FillPortions: =1
                  Text: ="Aurora — Role Preference"
                  Color: =ColorValue("#FFFFFF")
                  Size: =15
                  FontWeight: =FontWeight.Semibold
            - lblHdrUser:
                Control: Label@2.5.1
                Properties:
                  FillPortions: =1
                  Text: =varUser.Name & "  ·  " & varUser.Grade
                  Color: =ColorValue("#A9BACB")
                  Size: =12
                  Align: =Align.Right
      - recGreenStrip:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            FillPortions: =0
            Fill: =ColorValue("#008531")
            Height: =4
            Width: =Parent.Width
      - conMain:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            FillPortions: =1
            Width: =Parent.Width
            LayoutDirection: =LayoutDirection.Vertical
            LayoutAlignItems: =LayoutAlignItems.Center
            PaddingTop: =40
            PaddingBottom: =80
            PaddingLeft: =24
            PaddingRight: =24
          Children:
            - conContent:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =1
                  LayoutOverflowY: =LayoutOverflow.Scroll
                  Width: =Min(Parent.Width - 48, 1120)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =24
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                Children:
                  - cardSuccess:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        Height: =206
                        FillPortions: =0
                        Fill: =ColorValue("#008531")
                        RadiusTopLeft: =14
                        RadiusTopRight: =14
                        RadiusBottomLeft: =14
                        RadiusBottomRight: =14
                        PaddingTop: =32
                        PaddingBottom: =32
                        PaddingLeft: =34
                        PaddingRight: =34
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =10
                        Width: =Parent.Width
                      Children:
                        - lblSuccEyebrow:
                            Control: Label@2.5.1
                            Properties:
                              Width: =Parent.Width
                              FillPortions: =0
                              Text: ="SUBMISSION COMPLETE"
                              Color: =ColorValue("#FFFFFF")
                              Size: =13
                              FontWeight: =FontWeight.Bold
                              Height: =18
                        - lblSuccTitle:
                            Control: Label@2.5.1
                            Properties:
                              FillPortions: =0
                              Text: ="Your ranking and answers have been submitted"
                              Color: =ColorValue("#FFFFFF")
                              Size: =24
                              FontWeight: =FontWeight.Bold
                              AutoHeight: =true
                              Width: =Parent.Width - 68
                        - lblSuccDate:
                            Control: Label@2.5.1
                            Properties:
                              Width: =Parent.Width
                              FillPortions: =0
                              Text: ="Submitted on " & varStage2Date
                              Color: =ColorValue("#FFFFFF")
                              Size: =16
                              Height: =24
                  - cardRanking:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        Height: =442
                        FillPortions: =0
                        Fill: =ColorValue("#FFFFFF")
                        BorderColor: =ColorValue("#DCE2E8")
                        BorderThickness: =1
                        RadiusTopLeft: =12
                        RadiusTopRight: =12
                        RadiusBottomLeft: =12
                        RadiusBottomRight: =12
                        LayoutDirection: =LayoutDirection.Vertical
                        Width: =Parent.Width
                      Children:
                        - conRankHdr:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Height: =72
                              FillPortions: =0
                              BorderColor: =ColorValue("#DCE2E8")
                              BorderThickness: =1
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                              LayoutAlignItems: =LayoutAlignItems.Center
                              PaddingTop: =16
                              PaddingBottom: =16
                              PaddingLeft: =24
                              PaddingRight: =24
                              Width: =Parent.Width
                            Children:
                              - lblRankHdr:
                                  Control: Label@2.5.1
                                  Properties:
                                    FillPortions: =1
                                    Text: ="Your ranked preferences"
                                    Color: =ColorValue("#002B54")
                                    Size: =16
                                    FontWeight: =FontWeight.Bold
                              - lblLockedPill:
                                  Control: Label@2.5.1
                                  Properties:
                                    FillPortions: =0
                                    Text: ="Locked"
                                    Color: =ColorValue("#5B6670")
                                    Fill: =ColorValue("#EEF2F5")
                                    BorderColor: =ColorValue("#DCE2E8")
                                    BorderThickness: =1
                                    Size: =12
                                    FontWeight: =FontWeight.Semibold
                                    Align: =Align.Center
                                    VerticalAlign: =VerticalAlign.Middle
                                    Width: =80
                                    Height: =26
                        - galRanking:
                            Control: Gallery@2.15.0
                            Variant: Vertical
                            Properties:
                              FillPortions: =0
                              Items: =colLockedRanking
                              Width: =Parent.Width
                              Height: =CountRows(colLockedRanking) * 74
                              TemplateSize: =74
                            Children:
                              - conRankRow:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutGap: =18
                                    PaddingTop: =16
                                    PaddingBottom: =16
                                    PaddingLeft: =24
                                    PaddingRight: =24
                                    BorderColor: =ColorValue("#EEF1F4")
                                    BorderThickness: =1
                                    Width: =Parent.TemplateWidth
                                    Height: =Parent.TemplateHeight
                                  Children:
                                    - lblRankCircle:
                                        Control: Label@2.5.1
                                        Properties:
                                          FillPortions: =0
                                          Text: =ThisItem.Rank
                                          Fill: =ColorValue("#002B54")
                                          Color: =ColorValue("#FFFFFF")
                                          Size: =15
                                          FontWeight: =FontWeight.Bold
                                          Align: =Align.Center
                                          VerticalAlign: =VerticalAlign.Middle
                                          Width: =34
                                          Height: =34
                                    - conRankText:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          FillPortions: =0
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =2
                                          Width: =Parent.Width - 80
                                        Children:
                                          - lblRankName:
                                              Control: Label@2.5.1
                                              Properties:
                                                Width: =Parent.Width
                                                FillPortions: =0
                                                Text: =ThisItem.RoleName
                                                Color: =ColorValue("#1F2933")
                                                Size: =16
                                                FontWeight: =FontWeight.Bold
                                                Height: =24
                                          - lblRankDesc:
                                              Control: Label@2.5.1
                                              Properties:
                                                FillPortions: =0
                                                Text: =ThisItem.ShortDescription
                                                Color: =ColorValue("#5B6670")
                                                Size: =13
                                                Height: =20
                                                Width: =Parent.Width
                  - cardAnswers:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        Height: =1490
                        FillPortions: =0
                        Fill: =ColorValue("#FFFFFF")
                        BorderColor: =ColorValue("#DCE2E8")
                        BorderThickness: =1
                        RadiusTopLeft: =12
                        RadiusTopRight: =12
                        RadiusBottomLeft: =12
                        RadiusBottomRight: =12
                        LayoutDirection: =LayoutDirection.Vertical
                        Width: =Parent.Width
                      Children:
                        - conAnsHdr:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Height: =72
                              FillPortions: =0
                              BorderColor: =ColorValue("#DCE2E8")
                              BorderThickness: =1
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                              LayoutAlignItems: =LayoutAlignItems.Center
                              PaddingTop: =16
                              PaddingBottom: =16
                              PaddingLeft: =24
                              PaddingRight: =24
                              Width: =Parent.Width
                            Children:
                              - lblAnsHdr:
                                  Control: Label@2.5.1
                                  Properties:
                                    FillPortions: =1
                                    Text: ="Your supporting answers"
                                    Color: =ColorValue("#002B54")
                                    Size: =16
                                    FontWeight: =FontWeight.Bold
                              - lblAnsLockedPill:
                                  Control: Label@2.5.1
                                  Properties:
                                    FillPortions: =0
                                    Text: ="Locked"
                                    Color: =ColorValue("#5B6670")
                                    Fill: =ColorValue("#EEF2F5")
                                    BorderColor: =ColorValue("#DCE2E8")
                                    BorderThickness: =1
                                    Size: =12
                                    FontWeight: =FontWeight.Semibold
                                    Align: =Align.Center
                                    VerticalAlign: =VerticalAlign.Middle
                                    Width: =80
                                    Height: =26
                        - galAnswerGroups:
                            Control: Gallery@2.15.0
                            Variant: Vertical
                            Properties:
                              FillPortions: =0
                              Items: =FirstN(colLockedRanking, 3)
                              Width: =Parent.Width
                              Height: =3 * 470
                              TemplateSize: =470
                            Children:
                              - conGroup:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =2
                                    PaddingTop: =20
                                    PaddingBottom: =0
                                    PaddingLeft: =24
                                    PaddingRight: =24
                                    BorderColor: =ColorValue("#EEF1F4")
                                    BorderThickness: =1
                                    Width: =Parent.TemplateWidth
                                    Height: =Parent.TemplateHeight
                                  Children:
                                    - lblGrpRank:
                                        Control: Label@2.5.1
                                        Properties:
                                          Width: =Parent.Width
                                          FillPortions: =0
                                          Text: =Upper(If(ThisItem.Rank = 1, "Top choice · Rank 1", ThisItem.Rank = 2, "Second choice · Rank 2", "Third choice · Rank 3"))
                                          Color: =ColorValue("#0E6FA8")
                                          Size: =12
                                          FontWeight: =FontWeight.Bold
                                          Height: =18
                                    - lblGrpRole:
                                        Control: Label@2.5.1
                                        Properties:
                                          Width: =Parent.Width
                                          FillPortions: =0
                                          Text: =ThisItem.RoleName
                                          Color: =ColorValue("#002B54")
                                          Size: =17
                                          FontWeight: =FontWeight.Bold
                                          Height: =26
                                    - galGroupItems:
                                        Control: Gallery@2.15.0
                                        Variant: Vertical
                                        Properties:
                                          FillPortions: =0
                                          Items: =SortByColumns(Filter(colAnswers, RoleKey = ThisItem.RoleKey), "QIndex", SortOrder.Ascending)
                                          Width: =Parent.Width - 48
                                          Height: =2 * 190
                                          TemplateSize: =190
                                        Children:
                                          - conAnsItem:
                                              Control: GroupContainer@1.5.0
                                              Variant: AutoLayout
                                              Properties:
                                                LayoutDirection: =LayoutDirection.Vertical
                                                LayoutGap: =4
                                                PaddingTop: =10
                                                Width: =Parent.TemplateWidth
                                                Height: =Parent.TemplateHeight
                                              Children:
                                                - lblAnsQ:
                                                    Control: Label@2.5.1
                                                    Properties:
                                                      FillPortions: =0
                                                      Text: =ThisItem.QuestionText
                                                      Color: =ColorValue("#475160")
                                                      Size: =14
                                                      FontWeight: =FontWeight.Semibold
                                                      AutoHeight: =true
                                                      Width: =Parent.Width
                                                - lblAnsA:
                                                    Control: Label@2.5.1
                                                    Properties:
                                                      FillPortions: =0
                                                      Text: |-
                                                        =If(
                                                            Len(Trim(ThisItem.Answer)) > 0,
                                                            ThisItem.Answer,
                                                            Coalesce(LookUp(colSampleAnswers, RoleKey = ThisItem.RoleKey And QIndex = ThisItem.QIndex).Text, "—")
                                                        )
                                                      Color: =ColorValue("#1F2933")
                                                      Fill: =ColorValue("#F4F7F9")
                                                      BorderColor: =ColorValue("#E1E7EC")
                                                      BorderThickness: =1
                                                      Size: =15
                                                      PaddingTop: =12
                                                      PaddingBottom: =12
                                                      PaddingLeft: =14
                                                      PaddingRight: =14
                                                      AutoHeight: =true
                                                      Width: =Parent.Width
                  - cardNote:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        Height: =120
                        FillPortions: =0
                        Fill: =ColorValue("#F4F7F9")
                        BorderColor: =ColorValue("#E1E7EC")
                        BorderThickness: =1
                        RadiusTopLeft: =12
                        RadiusTopRight: =12
                        RadiusBottomLeft: =12
                        RadiusBottomRight: =12
                        PaddingTop: =20
                        PaddingBottom: =20
                        PaddingLeft: =22
                        PaddingRight: =22
                        Width: =Parent.Width
                      Children:
                        - lblNote:
                            Control: Label@2.5.1
                            Properties:
                              FillPortions: =0
                              Text: ="Thank you. Your ranking and answers have been recorded against your record and cannot be changed. If you believe anything here is incorrect, please contact your HR Business Partner."
                              Color: =ColorValue("#3A4651")
                              Size: =15
                              AutoHeight: =true
                              Width: =Parent.Width - 44
                  - btnHome:
                      Control: Label@2.5.1
                      Properties:
                        HoverFill: =ColorValue("#003C75")
                        PressedFill: =ColorValue("#001A33")
                        HoverColor: =ColorValue("#FFFFFF")
                        PressedColor: =ColorValue("#FFFFFF")
                        HoverBorderColor: =ColorValue("#003C75")
                        PressedBorderColor: =ColorValue("#001A33")
                        FillPortions: =0
                        Text: ="Home"
                        OnSelect: =Navigate(scrLanding)
                        Fill: =ColorValue("#002B54")
                        Color: =ColorValue("#FFFFFF")
                        BorderThickness: =0
                        Size: =16
                        FontWeight: =FontWeight.Semibold
                        Height: =48
                        Width: =130
