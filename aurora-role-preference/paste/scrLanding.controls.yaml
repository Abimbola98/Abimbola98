- conRoot:
    Control: GroupContainer@1.5.0
    Variant: AutoLayout
    Properties:
      X: =0
      Y: =0
      Width: =Parent.Width
      Height: =Parent.Height
      Fill: =ColorValue("#F2F5F7")
      LayoutDirection: =LayoutDirection.Vertical
      LayoutGap: =0
      LayoutAlignItems: =LayoutAlignItems.Stretch
      LayoutOverflowY: =LayoutOverflow.Scroll
    Children:
      - conHeaderBar:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            FillPortions: =0
            Fill: =ColorValue("#002B54")
            Height: =64
            Width: =Parent.Width
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingLeft: =24
            PaddingRight: =24
            LayoutGap: =16
          Children:
            - conBrand:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutGap: =14
                  Width: =Parent.Width - 300
                Children:
                  - lblLogo:
                      Control: Label@2.5.1
                      Properties:
                        FillPortions: =0
                        Text: ="A"
                        Width: =36
                        Height: =36
                        Fill: =ColorValue("#008531")
                        Color: =ColorValue("#FFFFFF")
                        Align: =Align.Center
                        VerticalAlign: =VerticalAlign.Middle
                        Size: =18
                        FontWeight: =FontWeight.Bold
                  - conBrandText:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        Width: =Parent.Width - 50
                        FillPortions: =0
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =0
                      Children:
                        - lblOrg:
                            Control: Label@2.5.1
                            Properties:
                              Width: =Parent.Width
                              FillPortions: =0
                              Text: ="ENVIRONMENT AGENCY"
                              Color: =ColorValue("#9FC9E4")
                              Size: =11
                              FontWeight: =FontWeight.Semibold
                              Height: =16
                        - lblAppName:
                            Control: Label@2.5.1
                            Properties:
                              Width: =Parent.Width
                              FillPortions: =0
                              Text: ="Aurora — Role Preference"
                              Color: =ColorValue("#FFFFFF")
                              Size: =15
                              FontWeight: =FontWeight.Semibold
                              Height: =24
            - conHeaderUser:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =0
                  LayoutAlignItems: =LayoutAlignItems.End
                  Width: =280
                Children:
                  - lblUserName:
                      Control: Label@2.5.1
                      Properties:
                        Width: =Parent.Width
                        FillPortions: =0
                        Text: =varUser.Name
                        Color: =ColorValue("#FFFFFF")
                        Size: =13
                        FontWeight: =FontWeight.Semibold
                        Align: =Align.Right
                        Height: =20
                  - lblUserMeta:
                      Control: Label@2.5.1
                      Properties:
                        Width: =Parent.Width
                        FillPortions: =0
                        Text: =varUser.Grade & " · " & varUser.Area
                        Color: =ColorValue("#A9BACB")
                        Size: =11
                        Align: =Align.Right
                        Height: =18
      - recGreenStrip:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            FillPortions: =0
            Fill: =ColorValue("#008531")
            Height: =4
            Width: =Parent.Width
      - conMain:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            FillPortions: =0
            Width: =Parent.Width
            LayoutDirection: =LayoutDirection.Vertical
            LayoutAlignItems: =LayoutAlignItems.Center
            PaddingTop: =40
            PaddingBottom: =80
            PaddingLeft: =24
            PaddingRight: =24
          Children:
            - conContent:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Width: =Min(Parent.Width - 48, 1120)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =28
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                Children:
                  - cardWelcome:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Fill: =ColorValue("#FFFFFF")
                        BorderColor: =ColorValue("#DCE2E8")
                        BorderThickness: =1
                        RadiusTopLeft: =14
                        RadiusTopRight: =14
                        RadiusBottomLeft: =14
                        RadiusBottomRight: =14
                        PaddingTop: =34
                        PaddingBottom: =30
                        PaddingLeft: =34
                        PaddingRight: =34
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =8
                      Children:
                        - lblWelcomeEyebrow:
                            Control: Label@2.5.1
                            Properties:
                              Width: =Parent.Width
                              FillPortions: =0
                              Text: ="WELCOME BACK"
                              Color: =ColorValue("#5B6670")
                              Size: =11
                              FontWeight: =FontWeight.Semibold
                              Height: =18
                        - lblWelcomeTitle:
                            Control: Label@2.5.1
                            Properties:
                              Width: =Parent.Width
                              FillPortions: =0
                              Text: ="Welcome, " & varUser.Name
                              Color: =ColorValue("#002B54")
                              Size: =26
                              FontWeight: =FontWeight.Bold
                              Height: =40
                        - conWelcomeGrid:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =32
                              LayoutWrap: =true
                              PaddingTop: =16
                              Width: =Parent.Width - 68
                            Children:
                              - conGrade:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    FillPortions: =0
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =5
                                    Width: =220
                                  Children:
                                    - lblGradeCap:
                                        Control: Label@2.5.1
                                        Properties:
                                          Width: =Parent.Width
                                          FillPortions: =0
                                          Text: ="GRADE"
                                          Color: =ColorValue("#5B6670")
                                          Size: =12
                                          FontWeight: =FontWeight.Semibold
                                          Height: =18
                                    - lblGradeVal:
                                        Control: Label@2.5.1
                                        Properties:
                                          Width: =Parent.Width
                                          FillPortions: =0
                                          Text: =varUser.Grade
                                          Color: =ColorValue("#1F2933")
                                          Size: =16
                                          FontWeight: =FontWeight.Semibold
                                          Height: =24
                              - conArea:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    FillPortions: =0
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =5
                                    Width: =320
                                  Children:
                                    - lblAreaCap:
                                        Control: Label@2.5.1
                                        Properties:
                                          Width: =Parent.Width
                                          FillPortions: =0
                                          Text: ="AREA"
                                          Color: =ColorValue("#5B6670")
                                          Size: =12
                                          FontWeight: =FontWeight.Semibold
                                          Height: =18
                                    - lblAreaVal:
                                        Control: Label@2.5.1
                                        Properties:
                                          Width: =Parent.Width
                                          FillPortions: =0
                                          Text: =varUser.Area
                                          Color: =ColorValue("#1F2933")
                                          Size: =16
                                          FontWeight: =FontWeight.Semibold
                                          Height: =24
                              - conTeam:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    FillPortions: =0
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =5
                                    Width: =220
                                  Children:
                                    - lblTeamCap:
                                        Control: Label@2.5.1
                                        Properties:
                                          Width: =Parent.Width
                                          FillPortions: =0
                                          Text: ="TEAM"
                                          Color: =ColorValue("#5B6670")
                                          Size: =12
                                          FontWeight: =FontWeight.Semibold
                                          Height: =18
                                    - lblTeamVal:
                                        Control: Label@2.5.1
                                        Properties:
                                          Width: =Parent.Width
                                          FillPortions: =0
                                          Text: =varUser.Team
                                          Color: =ColorValue("#1F2933")
                                          Size: =16
                                          FontWeight: =FontWeight.Semibold
                                          Height: =24
                        - lblLastLogin:
                            Control: Label@2.5.1
                            Properties:
                              Width: =Parent.Width
                              FillPortions: =0
                              Text: |-
                                ="Last logged in: " & varUser.LastLogin
                              Color: =ColorValue("#5B6670")
                              Size: =13
                              PaddingTop: =18
                              Height: =40
                  - lblDoHeading:
                      Control: Label@2.5.1
                      Properties:
                        Width: =Parent.Width
                        FillPortions: =0
                        Text: ="What would you like to do?"
                        Color: =ColorValue("#002B54")
                        Size: =18
                        FontWeight: =FontWeight.Bold
                        Height: =28
                  - conActions:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =20
                        LayoutWrap: =true
                        Width: =Parent.Width
                      Children:
                        - cardForm:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Fill: =ColorValue("#FFFFFF")
                              BorderColor: =ColorValue("#DCE2E8")
                              BorderThickness: =1
                              RadiusTopLeft: =12
                              RadiusTopRight: =12
                              RadiusBottomLeft: =12
                              RadiusBottomRight: =12
                              PaddingTop: =24
                              PaddingBottom: =22
                              PaddingLeft: =24
                              PaddingRight: =24
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =8
                              Width: =Min(Parent.Width, 540)
                            Children:
                              - recFormAccent:
                                  Control: GroupContainer@1.5.0
                                  Variant: ManualLayout
                                  Properties:
                                    FillPortions: =0
                                    Fill: =ColorValue("#008531")
                                    Height: =4
                                    Width: =Parent.Width - 48
                              - lblFormBadge:
                                  Control: Label@2.5.1
                                  Properties:
                                    FillPortions: =0
                                    Text: ="ALL STAFF"
                                    Color: =ColorValue("#006B27")
                                    Fill: =ColorValue("#E4F3EA")
                                    Size: =11
                                    FontWeight: =FontWeight.Bold
                                    PaddingLeft: =10
                                    PaddingRight: =10
                                    Align: =Align.Center
                                    VerticalAlign: =VerticalAlign.Middle
                                    Width: =92
                                    Height: =26
                              - lblFormTitle:
                                  Control: Label@2.5.1
                                  Properties:
                                    Width: =Parent.Width
                                    FillPortions: =0
                                    Text: ="My Preference Form"
                                    Color: =ColorValue("#002B54")
                                    Size: =17
                                    FontWeight: =FontWeight.Bold
                                    Height: =26
                              - lblFormBody:
                                  Control: Label@2.5.1
                                  Properties:
                                    FillPortions: =0
                                    Text: ="Rank the roles you have been identified as eligible for, then answer a few questions about your top two choices."
                                    Color: =ColorValue("#5B6670")
                                    Size: =14
                                    AutoHeight: =true
                                    Width: =Parent.Width - 48
                              - btnOpenForm:
                                  Control: Label@2.5.1
                                  Properties:
                                    FillPortions: =0
                                    Text: ="Open form →"
                                    OnSelect: |-
                                      =If(
                                          varStage2Submitted, Navigate(scrCompleted),
                                          varStage1Submitted, Navigate(scrReview),
                                          Navigate(scrForm)
                                      )
                                    Fill: =ColorValue("#FFFFFF")
                                    Color: =ColorValue("#008531")
                                    BorderThickness: =0
                                    Align: =Align.Left
                                    Size: =15
                                    FontWeight: =FontWeight.Semibold
                                    Height: =40
                                    Width: =Parent.Width - 48
                        - cardAdmin:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              FillPortions: =0
                              Visible: =varIsAdmin
                              Fill: =ColorValue("#FFFFFF")
                              BorderColor: =ColorValue("#C9D4DE")
                              BorderThickness: =1
                              RadiusTopLeft: =12
                              RadiusTopRight: =12
                              RadiusBottomLeft: =12
                              RadiusBottomRight: =12
                              PaddingTop: =24
                              PaddingBottom: =22
                              PaddingLeft: =24
                              PaddingRight: =24
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =8
                              Width: =Min(Parent.Width, 540)
                            Children:
                              - recAdminAccent:
                                  Control: GroupContainer@1.5.0
                                  Variant: ManualLayout
                                  Properties:
                                    FillPortions: =0
                                    Fill: =ColorValue("#54BCE7")
                                    Height: =4
                                    Width: =Parent.Width - 48
                              - lblAdminBadge:
                                  Control: Label@2.5.1
                                  Properties:
                                    FillPortions: =0
                                    Text: ="RESTRICTED · ADMIN ONLY"
                                    Color: =ColorValue("#002B54")
                                    Fill: =ColorValue("#E1F2FB")
                                    BorderColor: =ColorValue("#BBE2F4")
                                    BorderThickness: =1
                                    Size: =11
                                    FontWeight: =FontWeight.Bold
                                    PaddingLeft: =10
                                    PaddingRight: =10
                                    Align: =Align.Center
                                    VerticalAlign: =VerticalAlign.Middle
                                    Width: =180
                                    Height: =26
                              - lblAdminTitle:
                                  Control: Label@2.5.1
                                  Properties:
                                    Width: =Parent.Width
                                    FillPortions: =0
                                    Text: ="Submissions Overview"
                                    Color: =ColorValue("#002B54")
                                    Size: =17
                                    FontWeight: =FontWeight.Bold
                                    Height: =26
                              - lblAdminBody:
                                  Control: Label@2.5.1
                                  Properties:
                                    FillPortions: =0
                                    Text: ="View and manage submitted role preferences. Available to authorised HR administrators."
                                    Color: =ColorValue("#5B6670")
                                    Size: =14
                                    AutoHeight: =true
                                    Width: =Parent.Width - 48
                              - btnOpenOverview:
                                  Control: Label@2.5.1
                                  Properties:
                                    FillPortions: =0
                                    Text: ="Open overview →"
                                    OnSelect: =Navigate(scrOverview)
                                    Fill: =ColorValue("#FFFFFF")
                                    Color: =ColorValue("#0E6FA8")
                                    BorderThickness: =0
                                    Align: =Align.Left
                                    Size: =15
                                    FontWeight: =FontWeight.Semibold
                                    Height: =40
                                    Width: =Parent.Width - 48
